<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT BOSMATH- Dashboard Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #ffe4e1; min-height: 100vh; color: #333; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        .card { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1); border: 1px solid #ffb6c1; margin-bottom: 20px; }
        h2 { color: #d81b60; margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px dashed #ffb6c1; padding-bottom: 5px; }
        .sidebar-title { font-size: 1.5rem; color: #d81b60; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .nav-btn { display: block; width: 100%; background: #ff4081; color: white; padding: 12px; border-radius: 25px; border: none; cursor: pointer; margin-bottom: 10px; font-weight: bold; transition: 0.3s; }
        .nav-btn:hover { filter: brightness(0.9); transform: translateY(-2px); }
        .btn-logout { width: 100%; background: #c62828; color: white; padding: 12px; border-radius: 25px; border: none; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .class-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { background: #fff; border: 2px solid #ff4081; color: #ff4081; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .tab-btn.active { background: #ff4081; color: white; }
        .header-kelas { background: linear-gradient(to right, #ff4081, #d81b60); color: white; display: flex; justify-content: space-between; align-items: center; border-radius: 15px; padding: 20px; margin-bottom: 20px;}
        .input-kode { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ffb6c1; outline: none; text-align: center; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px;}
        .post-item { background: #fffafb; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #f8bbd0; position: relative; }
        .btn-download { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #4caf50; color: white; border-radius: 20px; text-decoration: none; font-size: 0.8em; font-weight: bold; }
        .badge-tipe { font-size: 0.75em; padding: 4px 10px; border-radius: 8px; color: white; font-weight: bold; text-transform: uppercase; }
        .bg-rpp { background: #9c27b0; } .bg-soal { background: #2196f3; } .bg-game { background: #ff9800; } .bg-materi { background: #ff4081; }
        .nilai-box { position: absolute; top: 20px; right: 20px; background: #ff4081; color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; }
        .box-kumpul { background: #ffebee; padding: 15px; border-radius: 10px; margin-top: 15px; border: 2px dashed #ff4081; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="card">
                <div class="sidebar-title">BOSMATH STUDENT</div>
                <p style="text-align: center; font-size: 0.8em; margin-bottom: 15px;">👤 <b id="nama-siswa">...</b></p>
                
                <button class="nav-btn" onclick="window.open('https://www.geogebra.org/classic', '_blank')">📐 Buka GeoGebra</button>
                <button class="btn-logout" onclick="prosesLogout()">🚪 Keluar</button>
            </div>
            <div class="card">
                <h2>➕ Gabung Kelas</h2>
                <input type="text" id="input-kode" class="input-kode" placeholder="KODE DARI GURU">
                <button class="nav-btn" onclick="gabungKelas()">Gabung Sekarang</button>
            </div>
        </div>

        <div class="main-content">
            <div class="class-tabs" id="tabs-kelas"></div>

            <div id="area-materi" style="display: none;">
                <div class="header-kelas">
                    <h3 id="judul-kelas-aktif" style="font-size: 1.5rem; margin:0;"></h3>
                    <button onclick="keluarKelas()" style="background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold;">👋 Keluar dari Kelas</button>
                </div>
                
                <div class="card">
                    <div id="daftar-materi"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyD0VI7Ai1oRgIwl2UXNV3tE4jbYZO9XJpY", authDomain: "learninp.firebaseapp.com", projectId: "learninp", storageBucket: "learninp.firebasestorage.app", messagingSenderId: "283126632684", appId: "1:283126632684:web:925104a875661b2f5f95c9" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let sesi = JSON.parse(localStorage.getItem('sesiPinkEdu'));
        if (!sesi || sesi.role !== 'siswa') location.href = 'index.html';
        document.getElementById('nama-siswa').innerText = sesi.nama;

        window.prosesLogout = () => { localStorage.clear(); location.href = 'index.html'; };

        let listKelas = JSON.parse(localStorage.getItem('myClasses_' + sesi.uid)) || [];
        let kelasAktifID = '';

        window.gabungKelas = async () => {
            let id = document.getElementById('input-kode').value.toUpperCase().trim();
            if (!id) return alert("Masukkan kode kelas!");
            if (listKelas.includes(id)) return alert("Anda sudah bergabung di kelas ini!");

            try {
                const docRef = doc(db, "kelas", id);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    let listSiswaCloud = snap.data().siswaGabung || [];
                    if(!listSiswaCloud.includes(sesi.nama)) {
                        listSiswaCloud.push(sesi.nama);
                        await updateDoc(docRef, { siswaGabung: listSiswaCloud });
                    }

                    listKelas.push(id);
                    localStorage.setItem('myClasses_' + sesi.uid, JSON.stringify(listKelas));
                    alert("Berhasil Gabung!");
                    location.reload(); 
                } else { alert("Kode Kelas Tidak Ditemukan!"); }
            } catch (err) { alert("Gagal terhubung ke server!"); }
        };

        // --- FUNGSI KELUAR KELAS (HAPUS KELAS) ---
        window.keluarKelas = async () => {
            if(confirm("Yakin ingin keluar dari kelas ini? Semua tugas yang sudah dikumpul akan tetap ada di guru, tapi Anda tidak bisa melihat kelas ini lagi.")) {
                try {
                    // 1. Hapus nama siswa dari database guru (opsional agar guru tahu siswa keluar)
                    const docRef = doc(db, "kelas", kelasAktifID);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        let listSiswaCloud = snap.data().siswaGabung || [];
                        let newListSiswa = listSiswaCloud.filter(nama => nama !== sesi.nama);
                        await updateDoc(docRef, { siswaGabung: newListSiswa });
                    }

                    // 2. Hapus kelas dari memori HP siswa
                    listKelas = listKelas.filter(id => id !== kelasAktifID);
                    localStorage.setItem('myClasses_' + sesi.uid, JSON.stringify(listKelas));
                    
                    alert("Berhasil keluar dari kelas.");
                    location.reload(); // Refresh halaman
                } catch (e) {
                    alert("Terjadi kesalahan saat keluar dari kelas.");
                }
            }
        };

        function renderTabs() {
            const area = document.getElementById('tabs-kelas');
            area.innerHTML = '';
            listKelas.forEach(id => {
                let btn = document.createElement('button');
                btn.className = 'tab-btn' + (kelasAktifID === id ? ' active' : '');
                btn.innerText = "Kelas: " + id;
                btn.onclick = () => bukaKonten(id);
                area.appendChild(btn);
            });
        }

        function bukaKonten(id) {
            kelasAktifID = id;
            renderTabs();
            document.getElementById('area-materi').style.display = 'block';
            onSnapshot(doc(db, "kelas", id), (snap) => {
                if(snap.exists()) {
                    const data = snap.data();
                    document.getElementById('judul-kelas-aktif').innerText = data.namaKelas;
                    renderDaftarMateri(data.postingan || [], data.tugasTerkumpul || []);
                } else {
                    // Jika kelas dihapus oleh guru, keluarkan siswa otomatis
                    listKelas = listKelas.filter(k => k !== id);
                    localStorage.setItem('myClasses_' + sesi.uid, JSON.stringify(listKelas));
                    document.getElementById('area-materi').style.display = 'none';
                    renderTabs();
                    alert("Kelas ini telah dihapus oleh Guru.");
                }
            });
        }

        window.kumpulTugas = async (postId, judulTugas) => {
            const fileInput = document.getElementById(`file-${postId}`);
            const btn = document.getElementById(`btn-${postId}`);
            if (fileInput.files.length === 0) return alert("Pilih file tugas dulu!");

            btn.innerText = "⏳ Mengunggah..."; btn.disabled = true;
            let fileUrl = "";

            try {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                const res = await fetch('https://store1.gofile.io/uploadFile', { method: 'POST', body: formData });
                const resJson = await res.json();
                if (resJson.status === "ok") fileUrl = resJson.data.downloadPage;
                
                const docRef = doc(db, "kelas", kelasAktifID);
                const snap = await getDoc(docRef);
                let listTugas = snap.data().tugasTerkumpul || [];
                
                listTugas.push({
                    postId: postId,
                    judulTugas: judulTugas,
                    namaSiswa: sesi.nama,
                    link: fileUrl,
                    nilai: ""
                });

                await updateDoc(docRef, { tugasTerkumpul: listTugas });
                alert("Tugas Berhasil Terkirim!");
            } catch (err) { alert("Gagal mengirim tugas!"); }
            finally { btn.innerText = "Kirim ke Guru"; btn.disabled = false; }
        };

        function renderDaftarMateri(materi, tugasSiswa) {
            const area = document.getElementById('daftar-materi');
            area.innerHTML = materi.length ? "" : "<p style='text-align:center; color:#999; margin-top:20px;'>Belum ada materi dari guru.</p>";
            
            materi.forEach(p => {
                let sudahKumpul = tugasSiswa.find(t => t.postId === p.id && t.namaSiswa === sesi.nama);
                let nilaiTampil = sudahKumpul && sudahKumpul.nilai ? `<div class="nilai-box">Nilai: ${sudahKumpul.nilai}</div>` : '';
                let badgeClass = "bg-" + p.tipe;

                let actionHtml = '';
                if (p.tipe === 'game') {
                    actionHtml = `<br><a href="${p.deskripsi}" target="_blank" class="nav-btn" style="display:inline-block; width:auto; padding:8px 25px; margin-top:10px;">🎮 Mainkan Game / Kuis</a>`;
                } else if (p.tipe === 'materi' || p.tipe === 'soal') {
                    actionHtml = `
                    <div class="box-kumpul">
                        <p style="font-size:0.85em; font-weight:bold; color:#d81b60; margin-bottom:5px;">📤 Kumpulkan Tugas Di Sini:</p>
                        ${sudahKumpul ? 
                            `<p style="color:#4caf50; font-weight:bold;">✅ Tugas sudah dikumpulkan</p>` : 
                            `<input type="file" id="file-${p.id}" style="margin-bottom:10px; display:block; width:100%;">
                             <button class="nav-btn" onclick="kumpulTugas(${p.id}, '${p.judul}')" id="btn-${p.id}" style="width:auto; padding:8px 25px;">Kirim ke Guru</button>`
                        }
                    </div>`;
                }

                area.innerHTML += `
                    <div class="post-item">
                        ${nilaiTampil}
                        <span class="badge-tipe ${badgeClass}">${p.tipe}</span>
                        <h3 style="color:#d81b60; margin-top:10px;">${p.judul}</h3>
                        <p style="font-size:0.9em; margin: 10px 0; color:#555; white-space:pre-wrap;">${p.tipe === 'game' ? 'Silakan klik tombol di bawah untuk memulai kuis.' : p.deskripsi}</p>
                        ${p.link ? `<a href="${p.link}" target="_blank" class="btn-download">📥 Unduh Lampiran File</a>` : ''}
                        ${actionHtml}
                    </div>`;
            });
        }

        renderTabs();
    </script>
</body>
</html>
